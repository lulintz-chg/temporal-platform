name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --project-directory . -f docker/docker-compose.yml config -q

  compose-smoke-test:
    runs-on: ubuntu-latest
    needs: [build, compose-validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Start Temporal stack
        run: docker compose --project-directory . -f docker/docker-compose.yml up -d

      - name: Wait for Temporal to be healthy
        run: ./scripts/wait-for-temporal.sh temporal:7233

      - name: Start workers (dev + prod namespaces)
        run: |
          set -a; . docker/namespaces/dev.env; set +a
          npm run worker & echo $! > worker-dev.pid

          set -a; . docker/namespaces/prod.env; set +a
          npm run worker & echo $! > worker-prod.pid

          sleep 5

      - name: Run sample workflow against dev namespace
        run: |
          set -a
          . docker/namespaces/dev.env
          set +a
          npm run start:greeting

      - name: Run sample workflow against prod namespace
        run: |
          set -a
          . docker/namespaces/prod.env
          set +a
          npm run start:greeting

      - name: Stop workers
        if: always()
        run: |
          kill "$(cat worker-dev.pid)" || true
          kill "$(cat worker-prod.pid)" || true

      - name: Tear down Temporal stack
        if: always()
        run: docker compose --project-directory . -f docker/docker-compose.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: [compose-smoke-test]
    if: false # placeholder — no deploy target wired up yet (docker compose deploy to come)
    steps:
      - run: echo "TODO: build+push worker image, docker compose pull && up -d on target host"
