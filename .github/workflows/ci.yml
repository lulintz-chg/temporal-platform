name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify workflow-bundle build mechanism (using the test fixture)
        run: TEMPORAL_APP_ENTRY="$(pwd)/test/fixtures/greeting" npm run build:workflow-bundle

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --project-directory . -f docker/docker-compose.yml config -q

  compose-smoke-test:
    runs-on: ubuntu-latest
    needs: [build, compose-validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Start Temporal stack
        run: docker compose --project-directory . -f docker/docker-compose.yml up -d

      - name: Wait for Temporal to be healthy
        run: ./scripts/wait-for-temporal.sh temporal:7233

      # Exercises the platform's worker/client harness end-to-end (cluster,
      # namespaces, task queue dispatch) using the greeting test fixture as a
      # stand-in for a real app's workflows/activities package.
      - name: Start workers (dev + prod namespaces)
        env:
          TEMPORAL_APP_ENTRY: ${{ github.workspace }}/test/fixtures/greeting
          TEMPORAL_TASK_QUEUE: greeting-task-queue
        run: |
          set -a; . docker/namespaces/dev.env; set +a
          npm run worker & echo $! > worker-dev.pid

          set -a; . docker/namespaces/prod.env; set +a
          npm run worker & echo $! > worker-prod.pid

          sleep 5

      - name: Run sample workflow against dev namespace
        env:
          TEMPORAL_TASK_QUEUE: greeting-task-queue
        run: |
          set -a
          . docker/namespaces/dev.env
          set +a
          npm run start:workflow -- greetingWorkflow '["World"]'

      - name: Run sample workflow against prod namespace
        env:
          TEMPORAL_TASK_QUEUE: greeting-task-queue
        run: |
          set -a
          . docker/namespaces/prod.env
          set +a
          npm run start:workflow -- greetingWorkflow '["World"]'

      - name: Stop workers
        if: always()
        run: |
          kill "$(cat worker-dev.pid)" || true
          kill "$(cat worker-prod.pid)" || true

      - name: Tear down Temporal stack
        if: always()
        run: docker compose --project-directory . -f docker/docker-compose.yml down -v

  credentialing-integration-smoke-test:
    runs-on: ubuntu-latest
    needs: [build, compose-validate]
    # Requires the CARBON_AUTH repo/org secret (real Carbon dev-API credentials) —
    # skip rather than hard-fail until it's configured.
    if: ${{ secrets.CARBON_AUTH != '' }}
    steps:
      - name: Checkout temporal-platform
        uses: actions/checkout@v4
        with:
          path: temporal-platform

      - name: Checkout credentialing-domain-poc
        uses: actions/checkout@v4
        with:
          repository: lulintz-chg/credentialing-domain-poc
          path: credentialing-domain-poc

      - uses: actions/setup-node@v4
        with:
          node-version-file: temporal-platform/.nvmrc
          cache: npm
          cache-dependency-path: |
            temporal-platform/package-lock.json
            credentialing-domain-poc/package-lock.json

      - name: 'Build temporal-platform (file: dependency resolves compiled dist/)'
        working-directory: temporal-platform
        run: |
          npm ci
          npm run build

      - name: Install credentialing-domain-poc
        working-directory: credentialing-domain-poc
        run: npm ci

      - name: Start Temporal stack
        working-directory: temporal-platform
        run: docker compose --project-directory . -f docker/docker-compose.yml up -d

      - name: Wait for Temporal to be healthy
        working-directory: temporal-platform
        run: ./scripts/wait-for-temporal.sh temporal:7233

      - name: Start webhook relay
        working-directory: temporal-platform
        run: |
          set -a; . docker/namespaces/dev.env; set +a
          npm run webhook & echo $! > ../webhook.pid
          sleep 2

      - name: Start credentialing worker
        working-directory: credentialing-domain-poc
        run: |
          set -a; . ../temporal-platform/docker/namespaces/dev.env; set +a
          npm run start & echo $! > ../worker.pid
          sleep 5

      - name: Run license-renewal workflow
        working-directory: credentialing-domain-poc
        env:
          CARBON_AUTH: ${{ secrets.CARBON_AUTH }}
          CARBON_BASE_URL: https://carbon-api.dev.chgapi.net
          WEBHOOK_BASE_URL: http://localhost:3001
        run: |
          set -a; . ../temporal-platform/docker/namespaces/dev.env; set +a
          npm run workflow

      - name: Stop workers/webhook
        if: always()
        run: |
          kill "$(cat webhook.pid)" || true
          kill "$(cat worker.pid)" || true

      - name: Tear down Temporal stack
        if: always()
        working-directory: temporal-platform
        run: docker compose --project-directory . -f docker/docker-compose.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: [compose-smoke-test]
    if: false # placeholder — no deploy target wired up yet (docker compose deploy to come)
    steps:
      - run: |
          echo "TODO: build+push worker image, docker compose pull && up -d on target host"
