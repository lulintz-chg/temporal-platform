name: Create a release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 0.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump package version
        run: |
          npm version "${{ github.event.inputs.tag }}" --no-git-tag-version --allow-same-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ github.event.inputs.tag }}" || echo "no changes to commit"
          git push origin HEAD:main

      - name: Tag release
        run: |
          git tag "v${{ github.event.inputs.tag }}"
          git push origin "v${{ github.event.inputs.tag }}"

      - name: Draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.tag }}
          draft: true
          generate_release_notes: true

  # Publish an immutable, version-tagged webhook-relay image for the release.
  # main pushes get :latest + :sha via ci.yml's publish-image job; this adds the
  # semver tag a deploy target can pin to.
  publish-image:
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push webhook-relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-webhook:v${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
